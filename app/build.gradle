
plugins {
    id 'com.android.application'
}

android {
    namespace "com.webview.hd"
    compileSdk 34

    defaultConfig {
        applicationId "com.webview.hd"
        minSdk 21
        targetSdk 34
        versionCode 10000
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
